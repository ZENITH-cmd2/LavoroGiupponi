databases:
  - name: calor-systems-db
    plan: free
    databaseName: calor_systems
    user: calor

services:
  - type: web
    name: calor-systems
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
